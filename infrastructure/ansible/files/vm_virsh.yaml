

- name: dc01-vm-00
  hosts: localhost
  become: true
  tasks:

    - name: define virsh network dc01-vm-00-fe
      command: virsh net-define ../../vms/dc01-vm-00/dc01-vm-00-fe.xml
      ignore_errors: yes

    - name: start virsh network dc01-vm-00-fe
      command: virsh net-start dc01-vm-00-fe
      ignore_errors: yes

    - name: define virsh network dc01-vm-00-be
      command: virsh net-define ../../vms/dc01-vm-00/dc01-vm-00-be.xml
      ignore_errors: yes

    - name: start virsh network dc01-vm-00-be
      command: virsh net-start dc01-vm-00-be
      ignore_errors: yes

    - name: add dc01-vm-00-fe bridge
      command: brctl addbr dc01-vm-00-fe
      ignore_errors: yes

    - name: dc01-vm-00-fe link up
      command: ip link set dc01-vm-00-fe up
      ignore_errors: yes

    - name: dc01-vm-00-fe ip address
      command: ip addr add 10.8.0.3/24 dev dc01-vm-00-fe
      ignore_errors: yes

    - name: berlin1-fe masquerade
      command: iptables -t nat -A POSTROUTING -o ens160 -j MASQUERADE
      ignore_errors: yes

    - name: add dc01-vm-00-be bridge
      command: brctl addbr dc01-vm-00-be
      ignore_errors: yes

    - name: dc01-vm-00-be link up
      command: ip link set dc01-vm-00-be up
      ignore_errors: yes

    - name: define virsh domain
      command: virsh define ../../vms/dc01-vm-00/dc01-vm-00.xml
      ignore_errors: yes

    - name: start dc01-vm-00 VM
      command: virsh start dc01-vm-00
      ignore_errors: yes

