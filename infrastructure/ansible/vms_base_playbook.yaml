# ansible-playbook -e "ansible_user=cisco ansible_ssh_pass=cisco123 ansible_sudo_pass=cisco123" -i hosts vms_base_playbook.yaml -vv

- name: Update the Git Repo
  hosts: localhost
  become: false
  tasks:

    - name: git pull to update repo on localhost
      command: git pull
      args:
        chdir: /home/cisco/LTRSPG-2212
      ignore_errors: yes

- name: dc01-vm-00 setup
  hosts: vm_00
  become: true
  tasks:

    - name: copy hosts file for dc01-vm-00
      copy:
        src: /home/cisco/LTRSPG-2212/infrastructure/vms/dc01-vm-00/hosts
        dest: /etc/hosts
      ignore_errors: yes

    - name: hostnamectl set dc01-vm-00
      command: hostnamectl hostname dc01-vm-00
      ignore_errors: yes

- name: dc01-vm-01 setup
  hosts: vm_01
  become: true
  tasks:

    - name: copy hosts file for dc01-vm-01
      copy:
        src: /home/cisco/LTRSPG-2212/infrastructure/vms/dc01-vm-01/hosts
        dest: /etc/hosts
      ignore_errors: yes

    - name: hostnamectl set dc01-vm-01
      command: hostnamectl hostname dc01-vm-01
      ignore_errors: yes

- name: dc01-vm-02 setup
  hosts: vm_02
  become: true
  tasks:

    - name: copy hosts file for dc01-vm-02
      copy:
