# Containerlab topology file for Cisco Live EU 2026 Lab 1

name: cleu26

mgmt:
  network: mgt-network
  ipv4-subnet: 172.20.6.0/24

topology:
  nodes:

# XRd Core Network
    xrd01:
      kind: cisco_xrd
      image: cisco-xrd-control-plane:24.4.1
      startup-config: xrd-config/xrd01.cfg
      mgmt-ipv4: 172.20.6.101

    xrd02:
      kind: cisco_xrd
      image: cisco-xrd-control-plane:24.4.1
      startup-config: xrd-config/xrd02.cfg
      mgmt-ipv4: 172.20.6.102

    xrd03:
      kind: cisco_xrd
      image: cisco-xrd-control-plane:24.4.1
      startup-config: xrd-config/xrd03.cfg
      mgmt-ipv4: 172.20.6.103

    xrd04:
      kind: cisco_xrd
      image: cisco-xrd-control-plane:24.4.1
      startup-config: xrd-config/xrd04.cfg
      mgmt-ipv4: 172.20.6.104

    xrd05:
      kind: cisco_xrd
      image: cisco-xrd-control-plane:24.4.1
      startup-config: xrd-config/xrd05.cfg
      mgmt-ipv4: 172.20.6.105

    xrd06:
      kind: cisco_xrd
      image: cisco-xrd-control-plane:24.4.1
      startup-config: xrd-config/xrd06.cfg
      mgmt-ipv4: 172.20.6.106

    xrd07:
      kind: cisco_xrd
      image: cisco-xrd-control-plane:24.4.1
      startup-config: xrd-config/xrd07.cfg
      mgmt-ipv4: 172.20.6.107

    app-container-07:
      kind: linux
      image: cl-rome-container:latest
      mgmt-ipv4: 172.20.6.109
      cap-add:
        - NET_ADMIN
        - NET_RAW
      ports:
        - 2222:22

    app-container-01:
      kind: linux
      image: cl-london-container:latest
      mgmt-ipv4: 172.20.6.108
      cap-add:
        - NET_ADMIN
        - NET_RAW
      ports:
        - 22222:22

# DC SONiC Network
    sonic-leaf-00:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.128

    sonic-leaf-01:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.129

    sonic-leaf-02:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.130


    sonic-spine-00:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.192

    sonic-spine-01:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.193

    sonic-spine-02:
      kind: linux
      image: vrnetlab/sonic_sonic-vs:vpp20250422
      mgmt-ipv4: 172.20.6.194

    dc01-vm-00-fe:
      kind: bridge
    dc01-vm-01-fe:
      kind: bridge
    dc01-vm-02-fe:
      kind: bridge

    dc01-vm-00-be:
      kind: bridge
    dc01-vm-01-be:
      kind: bridge
    dc01-vm-02-be:
      kind: bridge


  links:

    # Core Network Links
    - endpoints: ["xrd01:Gi0-0-0-0", "app-container-01:eth1"]                      # Link O
    - endpoints: ["xrd01:Gi0-0-0-1", "xrd02:Gi0-0-0-0"]                        # Link A
    - endpoints: ["xrd01:Gi0-0-0-2", "xrd05:Gi0-0-0-0"]                            # Link B
    - endpoints: ["xrd02:Gi0-0-0-1", "xrd03:Gi0-0-0-0"]                        # Link E
    - endpoints: ["xrd02:Gi0-0-0-2", "xrd06:Gi0-0-0-1"]                     # Link C
    - endpoints: ["xrd03:Gi0-0-0-1", "xrd04:Gi0-0-0-0"]                           # Link F
    - endpoints: ["xrd04:Gi0-0-0-1", "xrd07:Gi0-0-0-1"]                             # Link H
    - endpoints: ["xrd05:Gi0-0-0-1", "xrd04:Gi0-0-0-2"]                            # Link D
    - endpoints: ["xrd05:Gi0-0-0-2", "xrd06:Gi0-0-0-2"]                         # Link G
    - endpoints: ["xrd06:Gi0-0-0-0", "xrd07:Gi0-0-0-2"]                          # Link I
    - endpoints: ["xrd07:Gi0-0-0-0", "app-container-07:eth1"]                          # Link J
    - endpoints: ["xrd07:Gi0-0-0-3", "app-container-07:eth2"]                          # Link K

    # DC SONiC Network Links
    - endpoints: ["sonic-leaf-00:eth1", "sonic-spine-00:eth1"]
    - endpoints: ["sonic-leaf-00:eth2", "sonic-spine-01:eth1"]
    - endpoints: ["sonic-leaf-00:eth3", "sonic-spine-02:eth1"]
    - endpoints: ["sonic-leaf-01:eth1", "sonic-spine-00:eth2"]
    - endpoints: ["sonic-leaf-01:eth2", "sonic-spine-01:eth2"]
    - endpoints: ["sonic-leaf-01:eth3", "sonic-spine-02:eth2"]
    - endpoints: ["sonic-leaf-02:eth1", "sonic-spine-00:eth3"]
    - endpoints: ["sonic-leaf-02:eth2", "sonic-spine-01:eth3"]
    - endpoints: ["sonic-leaf-02:eth3", "sonic-spine-02:eth3"]


    # DC SONiC Network Links to VMs
    - endpoints: ["sonic-leaf-00:eth5", "dc01-vm-00-be:sonic-leaf00-eth5"]
    - endpoints: ["sonic-leaf-01:eth5", "dc01-vm-01-be:sonic-leaf01-eth5"]
    - endpoints: ["sonic-leaf-02:eth5", "dc01-vm-02-be:sonic-leaf02-eth5"]


    # DC SONiC Front End Network Links between VMs (bridges) and XRd
    - endpoints: ["xrd01:Gi0-0-0-3", "dc01-vm-00-fe:xrd01:Gi0-0-0-3"]
    - endpoints: ["xrd01:Gi0-0-0-4", "dc01-vm-01-fe:xrd01:Gi0-0-0-4"]
    - endpoints: ["xrd01:Gi0-0-0-5", "dc01-vm-02-fe:xrd01:Gi0-0-0-5"]



